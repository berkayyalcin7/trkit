name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # npm Trusted Publishing (OIDC) — token gerekmez, provenance otomatik
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing npm >= 11.5 gerektirir; Node 22 npm 10 ile gelir
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run verify
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
